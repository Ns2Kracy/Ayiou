[package]
name = "ayiou"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
async-trait = "0.1.89"
ayiou-macros = { path = "../ayiou-macros" }
ayiou-wasm-sdk = { path = "../ayiou-wasm-sdk" }
dashmap = "6.1.0"
futures = "0.3.31"
futures-util = "0.3.31"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48", features = ["full"] }
tokio-tungstenite = "0.28.0"
log = "0.4"
pretty_env_logger = "0.5"
url = "2.5.7"
regex = "1"
cron = "0.15"
chrono = "0.4"
toml = "0.8"

[dev-dependencies]
tempfile = "3.25.0"
