name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Use Rust stable
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test without default features
        run: cargo test -p ayiou --no-default-features

      - name: Test all features
        run: cargo test -p ayiou --all-features

      - name: Test workspace defaults
        run: cargo test --workspace

      - name: Build examples
        run: cargo build -p ayiou --all-features --examples

      - name: Package macro crate
        run: cargo package -p ayiou-macros --locked

      - name: Package runtime crate
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "ayiou-macros") | .version')"
          if cargo search ayiou-macros --limit 1 | grep -q "^ayiou-macros = \"$version\""; then
            cargo package -p ayiou --locked
          else
            echo "Skipping ayiou package verification until ayiou-macros $version exists on crates.io."
          fi
